version: 2
updates:
  # This package has zero runtime dependencies and (currently) no dev
  # dependencies either. We still keep an npm ecosystem entry so the
  # moment a devDep gets added (a tokenizer for benchmarks, a perf harness,
  # etc.) Dependabot is already wired up.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch any future dev tooling (types, test helpers, bundlers) into
      # one PR so review noise stays bounded.
      dev-deps:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - ci
